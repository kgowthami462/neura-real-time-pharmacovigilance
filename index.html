<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURA - Intelligent Social Listening</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <style> 
    /* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --cyan: #00ffff;
    --gold: #ffd700;
    --bg: #0a0f1c;
    --text: #e2e8f0;
    --muted: #94a3b8;
}

/* ===== BODY ===== */
body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;

    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* ===== NETWORK CANVAS ===== */
#network {
    position: fixed;
    inset: 0;
    z-index: 0;
}

/* ===== AMBIENT GLOW ===== */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: 0;
}

body::before {
    top: -100px;
    left: -100px;
    background: rgba(0,255,255,0.12);
}

body::after {
    bottom: -100px;
    right: -100px;
    background: rgba(255,215,0,0.08);
}

/* ===== CORE RING ===== */
.ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 420px;
    height: 420px;
    transform: translate(-50%, -50%);
    border-radius: 50%;

    background: radial-gradient(circle, rgba(0,255,255,0.12), transparent 70%);

    box-shadow:
        0 0 40px var(--cyan),
        0 0 120px rgba(0,255,255,0.5),
        0 0 180px rgba(255,215,0,0.4);

    animation: rotate 18s linear infinite;
    z-index: 1;
}

.ring::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,215,0,0.4);
    animation: pulse 3s infinite;
}

@keyframes rotate {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.15); opacity: 0; }
}

/* ===== ORBIT ICON SYSTEM ===== */
.icons {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 520px;
    height: 520px;
    transform: translate(-50%, -50%);
    z-index: 2;
    animation: spin 35s linear infinite;
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

.icons i {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: 20px;
    color: var(--gold);

    transform-origin: center;

    text-shadow:
        0 0 10px var(--gold),
        0 0 20px rgba(215, 193, 63, 0.611),
        0 0 30px rgba(0,255,255,0.3);
}

/* evenly distributed orbit */
.icons i:nth-child(1) { transform: rotate(0deg) translateY(-250px) rotate(0deg); }
.icons i:nth-child(2) { transform: rotate(40deg) translateY(-250px) rotate(-40deg); }
.icons i:nth-child(3) { transform: rotate(80deg) translateY(-250px) rotate(-80deg); }
.icons i:nth-child(4) { transform: rotate(120deg) translateY(-250px) rotate(-120deg); }
.icons i:nth-child(5) { transform: rotate(160deg) translateY(-250px) rotate(-160deg); }
.icons i:nth-child(6) { transform: rotate(200deg) translateY(-250px) rotate(-200deg); }
.icons i:nth-child(7) { transform: rotate(240deg) translateY(-250px) rotate(-240deg); }
.icons i:nth-child(8) { transform: rotate(280deg) translateY(-250px) rotate(-280deg); }
.icons i:nth-child(9) { transform: rotate(320deg) translateY(-250px) rotate(-320deg); }

.hero-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;

    padding: 70px 90px;

    background: none;
    backdrop-filter: none;

    border-radius: 0;
    color: white;

    border: none;
    font-family : 'Times New Roman', Times , serif;
    box-shadow: none;

    text-align: center;
    width: 500px;
    height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    margin: 0 0 20px 0;
    font-size: 3.5rem;
}

.subtitle {
    margin: 20px 0 30px 0;
    font-size: 0.95rem;
    line-height: 1.6;
}

.btn {
    margin-top: 20px;
}

/* ===== TITLE ===== */
h1 {
    font-size: 5.5rem;
    font-weight: 800;
    letter-spacing: 6px;

    background: linear-gradient(90deg, #ffffff, var(--cyan), var(--gold));
    background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 20px rgba(0,255,255,0.5),
        0 0 40px rgba(255,215,0,0.3);
}

/* ===== SUBTITLE ===== */
.subtitle {
    font-size: 1.05rem;
    color: var(--muted);
    line-height: 1.8;
    margin: 25px 0 45px;
    max-width: 650px;
}

/* ===== BUTTON ===== */
.btn {
    padding: 14px 48px;
    border-radius: 50px;
    border: 2px solid rgba(0,255,255,0.6);
    background: transparent;
    color: white;
    font-weight: 600;
    cursor: pointer;

    transition: 0.3s;

    box-shadow:
        0 0 25px rgba(0,255,255,0.4),
        0 0 60px rgba(255,215,0,0.2);
}

.btn:hover {
    background: rgba(0,255,255,0.1);

    box-shadow:
        0 0 50px rgba(0,255,255,0.8),
        0 0 100px rgba(255,215,0,0.5);

    transform: translateY(-3px);
}

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
}

.modal {
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;

    box-shadow:
        0 0 30px rgba(0,255,255,0.2);

    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* ===== INPUT ===== */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    font-size: 0.8rem;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: white;
    outline: none;
}

.input-group input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

/* ===== AUTH BUTTON ===== */
.auth-btn {
    width: 100%;
    padding: 12px;
    background: var(--cyan);
    color: black;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

/* ===== ERROR ===== */
.error-msg {
    font-size: 0.85rem;
    text-align: center;
    margin-top: 10px;
    display: none;
    color: #ff6b6b;
}

/* ===== WAVE CONTAINER ===== */
.wave-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 800px;
    z-index: 1;
    pointer-events: none;
}

svg.wave {
    position: absolute;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.3));
}

svg.wave path {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* ===== MESH CONTAINER ===== */
.mesh-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    z-index: 2;
    pointer-events: none;
}

canvas#mesh {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* ===== CORE GLOW ===== */
.core-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 255, 255, 0.7), rgba(0, 255, 255, 0.2), transparent);
    filter: blur(40px);
    box-shadow: 
        0 0 100px rgba(0, 255, 255, 0.6),
        0 0 150px rgba(0, 255, 255, 0.3);
    animation: pulseglow 3s ease-in-out infinite;
    z-index: 4;
}

@keyframes pulseglow {
    0%, 100% { 
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
    }
    50% { 
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0.8;
    }
}

/* ===== UPDATE Z-INDEX FOR RING ===== */
.ring {
    z-index: 3;
}

/* ===== UPDATE Z-INDEX FOR ICONS ===== */
.icons {
    z-index: 5;
}

/* ===== UPDATE Z-INDEX FOR HERO ===== */
.hero-container {
    z-index: 10;
}

/* ===== UPDATE MODAL Z-INDEX ===== */
.modal-overlay {
    z-index: 1000;
}

/* ===== MODAL HEADING ===== */
.modal h2 {
    margin-top: 0;
    margin-bottom: 25px;
    font-weight: 600;
    text-align: center;
    color: var(--cyan);
    letter-spacing: 2px;
}

/* ===== SWITCH MODE ===== */
.switch-mode {
    text-align: center;
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--muted);
}

.switch-mode span {
    color: var(--cyan);
    cursor: pointer;
    font-weight: 600;
}

.switch-mode span:hover {
    text-decoration: underline;
}

/* ===== BUTTON IMPROVEMENTS ===== */
.btn {
    font-size: 1rem;
    letter-spacing: 1px;
}

.btn:active {
    transform: translateY(-1px);
}

/* ===== INPUT IMPROVEMENTS ===== */
.input-group input {
    font-size: 0.95rem;
    transition: all 0.3s;
}

.input-group input:focus {
    background: rgba(0,0,0,0.6);
}

.input-group label {
    text-transform: uppercase;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* ===== AUTH BUTTON IMPROVEMENTS ===== */
.auth-btn {
    margin-top: 10px;
    transition: all 0.3s;
    font-size: 1rem;
}

.auth-btn:hover {
    box-shadow: 0 0 25px rgba(0,255,255,0.5);
    transform: translateY(-2px);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    h1 {
        font-size: 3.5rem;
        letter-spacing: 3px;
    }
    
    .hero-container {
        padding: 50px 40px;
    }
    
    .subtitle {
        font-size: 0.95rem;
    }
    
    .wave-container,
    .mesh-container,
    .icons {
        width: 500px;
        height: 500px;
    }
    
    .icons i:nth-child(1) { transform: rotate(0deg) translateY(-190px) rotate(0deg); }
    .icons i:nth-child(2) { transform: rotate(40deg) translateY(-190px) rotate(-40deg); }
    .icons i:nth-child(3) { transform: rotate(80deg) translateY(-190px) rotate(-80deg); }
    .icons i:nth-child(4) { transform: rotate(120deg) translateY(-190px) rotate(-120deg); }
    .icons i:nth-child(5) { transform: rotate(160deg) translateY(-190px) rotate(-160deg); }
    .icons i:nth-child(6) { transform: rotate(200deg) translateY(-190px) rotate(-200deg); }
    .icons i:nth-child(7) { transform: rotate(240deg) translateY(-190px) rotate(-240deg); }
    .icons i:nth-child(8) { transform: rotate(280deg) translateY(-190px) rotate(-280deg); }
    .icons i:nth-child(9) { transform: rotate(320deg) translateY(-190px) rotate(-320deg); }
}
   </style> 

    
</head>
<body>
    <canvas id ="network"></canvas>
    <div class="ring"></div> 
    <div class="icons">
  <i class="fab fa-reddit"></i>
  <i class="fab fa-twitter"></i>
  <i class="fab fa-linkedin"></i>
  <i class="fab fa-facebook"></i>
  <i class="fab fa-tiktok"></i>
  <i class="fas fa-heartbeat"></i>
  <i class="fas fa-stethoscope"></i>
  <i class="fas fa-dna"></i>
  <i class="fas fa-notes-medical"></i>
</div>
    
    <div class="glow-orb-1"></div>
    <div class="glow-orb-2"></div>

    <div class="hero-container">
        <h1>NEURA</h1>
        <p class="subtitle">Enterprise-grade social listening and pharmacovigilance. Detect adverse medication events across millions of online interactions in real-time using advanced Agentic AI.</p>
        <button class="btn" onclick="openModal()">Access Platform</button>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal">
            <h2 id="modal-title">Sign In</h2>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="you@company.com" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            
            <div id="auth-error" class="error-msg"></div>
            
            <button class="auth-btn" id="auth-submit-btn" onclick="submitAuth()">Sign In</button>
            
            <div class="switch-mode">
                <span id="mode-text">Don't have an account? <span onclick="toggleMode()">Register here</span></span>
            </div>
        </div>
    </div>

    <script>
    let isLoginMode = true;

    // Auto-redirect if already logged in
    if (localStorage.getItem('hp_token')) {
        window.location.href = '/static/portal.html';
    }

    function openModal() {
        document.getElementById('auth-modal').style.display = 'flex';
    }

    // Close modal when clicking outside
    document.getElementById('auth-modal').addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
    });

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('modal-title').innerText = isLoginMode ? 'Sign In' : 'Create Account';
        document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'Sign In' : 'Register';
        
        if(isLoginMode) {
            document.getElementById('mode-text').innerHTML = `Don't have an account? <span onclick="toggleMode()">Register here</span>`;
        } else {
            document.getElementById('mode-text').innerHTML = `Already have an account? <span onclick="toggleMode()">Sign in</span>`;
        }
        document.getElementById('auth-error').style.display = 'none';
    }

    async function submitAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const errorDiv = document.getElementById('auth-error');
        const btn = document.getElementById('auth-submit-btn');
        
        if(!email || !password) {
            errorDiv.innerText = "Please fill in all fields.";
            errorDiv.style.display = 'block';
            return;
        }

        btn.innerText = 'Processing...';
        btn.disabled = true;
        errorDiv.style.display = 'none';

        const endpoint = isLoginMode ? '/login' : '/register';
        
        try {
            let bodyData;
            let headers = {};
            
            if (isLoginMode) {
                bodyData = new URLSearchParams();
                bodyData.append('username', email);
                bodyData.append('password', password);
                headers = {'Content-Type': 'application/x-www-form-urlencoded'};
            } else {
                bodyData = JSON.stringify({ email: email, password: password });
                headers = {'Content-Type': 'application/json'};
            }

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: headers,
                body: bodyData
            });

            const responseText = await response.text();
            let data;

            try {
                data = JSON.parse(responseText);
            } catch (e) {
                throw new Error(responseText || "Server error occurred");
            }

            if (!response.ok) {
                throw new Error(data.detail || "Authentication failed");
            }

            if (isLoginMode) {
                localStorage.setItem('hp_token', data.access_token);
                window.location.href = '/static/portal.html';
            } else {
                errorDiv.innerText = "Registration successful! Please sign in.";
                errorDiv.style.color = "#10b981"; 
                errorDiv.style.display = 'block';
                toggleMode(); 
            }

        } catch (err) {
            errorDiv.innerText = err.message;
            errorDiv.style.color = "#ef4444";
            errorDiv.style.display = 'block';
        } finally {
            btn.innerText = isLoginMode ? 'Sign In' : 'Register';
            btn.disabled = false;
        }
    }
</script>

<script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

for (let i = 0; i < 60; i++) {
    nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    nodes.forEach(n => {
        n.x += n.dx;
        n.y += n.dy;

        if (n.x < 0 || n.x > canvas.width) n.dx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.dy *= -1;

        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,255,255,0.6)";
        ctx.fill();
    });

    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            let dx = nodes[i].x - nodes[j].x;
            let dy = nodes[i].y - nodes[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = "rgba(0,255,255,0.1)";
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
